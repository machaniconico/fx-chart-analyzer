name: Update FX data (daily)

on:
  schedule:
    # 06:00 JST = 21:00 UTC (前日)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch latest FX data from Dukascopy
        run: npm run fetch:data

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: daily FX data update"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN による push は deploy.yml を発火しないため、ここでデプロイまで行う
      - run: npm run build
        if: steps.commit.outputs.changed == 'true'

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fx-chart-analyzer --branch=main --commit-dirty=true --commit-message="daily data update"
