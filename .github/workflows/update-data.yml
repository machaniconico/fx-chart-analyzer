name: Update FX data (daily)

on:
  schedule:
    # 06:00 JST = 21:00 UTC (前日)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Dukascopy 全滅時(障害/ブロック)でもカレンダー/COT/統計/デプロイは続行する。
      # リポジトリにコミット済みの既存データがフォールバックになる。
      - name: Fetch latest FX data from Dukascopy
        continue-on-error: true
        run: npm run fetch:data

      - name: Fetch Forex Factory calendar
        continue-on-error: true
        run: node scripts/fetch-calendar.mjs

      - name: Fetch CFTC COT data
        continue-on-error: true
        run: node scripts/fetch-cot.mjs

      - name: Build adaptive model stats
        run: node scripts/build-model-stats.mjs

      - name: Build scanner walk-forward stats
        continue-on-error: true
        run: node scripts/build-scanner-stats.mjs

      - name: Run EA forward tests
        continue-on-error: true
        run: node scripts/run-forward-test.mjs

      - name: Commit updated data
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: daily FX data update"
            git push
          fi

      # GITHUB_TOKEN による push は deploy.yml を発火しないため、ここでデプロイまで行う
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fx-chart-analyzer --branch=main --commit-dirty=true --commit-message="daily data update"
